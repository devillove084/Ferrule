name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  FERRULE_NO_CUDA: "1"
  RUST_BACKTRACE: "1"

jobs:
  lint:
    name: Lint and docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
          components: clippy,rustfmt
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
      - name: Run lint checks
        run: just lint

  test:
    name: CPU tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXTEST_PROFILE: ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - name: Run CPU test suite
        run: just test

  miri:
    name: Miri
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
          components: miri,rust-src
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: miri
      - name: Run Miri
        run: just miri

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Check advisories, licenses, bans, and sources
        run: just deny
