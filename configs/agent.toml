[observability]
service_name = "ferrule"
log_level = "info"
log_format = "json"
metrics_enabled = true
metrics_bind = "127.0.0.1:9000"

[model]
backend = "real"
model_id = "./models/SmolLM2-135M-Instruct"
family = "llama"
device = "auto"
chat_template = "plain"
dtype = "f32"
use_flash_attn = false
use_kv_cache = true

[rollout]
max_steps = 8
seed = 42

[agent]
initial_observation = "Please compute 2+2. You may use the calc tool. If you finish, output FINAL:4."
max_steps = 4
max_new_tokens = 24
temperature = 0.0
top_p = 0.9
top_k = 20
expected_final = "4"
