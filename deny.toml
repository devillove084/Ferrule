[advisories]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste is an unmaintained transitive dependency of tokenizers without a known vulnerability" },
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = ["https://github.com/devillove084/cuda-oxide.git"]
