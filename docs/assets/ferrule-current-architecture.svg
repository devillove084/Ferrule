<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ferrule Runtime Architecture</title>
  <desc id="desc">Ferrule architecture centered on a Rust-native state-aware LLM runtime with model execution, quantization, kernels, state fabric, and hardware-aware deployment.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#101936"/>
      <stop offset="1" stop-color="#062420"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D8B4FE"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#93C5FD"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#86EFAC"/>
    </marker>
    <style>
      .title { font: 850 40px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #F8FAFC; letter-spacing: -0.035em; }
      .subtitle { font: 520 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #CBD5E1; }
      .label { font: 780 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #F8FAFC; }
      .cardLabel { font: 760 17px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #F8FAFC; }
      .small { font: 560 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #E2E8F0; }
      .tiny { font: 540 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #C8D3E4; }
      .mono { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #F8FAFC; }
      .card { filter: url(#shadow); stroke: rgba(255,255,255,.18); stroke-width: 1; }
      .panel { fill: rgba(15,23,42,.76); stroke: rgba(148,163,184,.24); stroke-width: 1; filter: url(#shadow); }
      .pill { fill: rgba(15,23,42,.50); stroke: rgba(255,255,255,.20); stroke-width: 1; }
      .flow { stroke: #93C5FD; stroke-width: 2.8; marker-end: url(#arrow); fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .softFlow { stroke: #86EFAC; stroke-width: 2.2; marker-end: url(#arrowGreen); fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: .88; }
      .dash { stroke-dasharray: 7 8; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="116" r="260" fill="#2563EB" opacity="0.10"/>
  <circle cx="190" cy="590" r="300" fill="#14B8A6" opacity="0.10"/>
  <circle cx="650" cy="350" r="360" fill="#F97316" opacity="0.055"/>

  <text x="64" y="70" class="title">Ferrule</text>
  <text x="64" y="100" class="subtitle">Rust-native state-aware LLM runtime for edge, cloud, and future hardware</text>

  <g transform="translate(390 138)">
    <rect class="card" width="500" height="238" rx="36" fill="url(#core)"/>
    <text x="34" y="52" class="label">Ferrule Runtime</text>
    <text x="34" y="82" class="small">the system core</text>

    <g transform="translate(34 116)">
      <rect class="pill" width="132" height="46" rx="16"/>
      <text x="22" y="29" class="tiny">Rust Core</text>
    </g>
    <g transform="translate(184 116)">
      <rect class="pill" width="132" height="46" rx="16"/>
      <text x="18" y="29" class="tiny">State Model</text>
    </g>
    <g transform="translate(334 116)">
      <rect class="pill" width="132" height="46" rx="16"/>
      <text x="20" y="29" class="tiny">Scheduler</text>
    </g>

    <g transform="translate(34 176)">
      <rect class="pill" width="204" height="42" rx="15"/>
      <text x="22" y="27" class="tiny">Model Execution</text>
    </g>
    <g transform="translate(262 176)">
      <rect class="pill" width="204" height="42" rx="15"/>
      <text x="22" y="27" class="tiny">Hardware Policy</text>
    </g>
  </g>

  <g transform="translate(70 168)">
    <rect class="card" width="238" height="160" rx="28" fill="url(#purple)"/>
    <text x="26" y="44" class="cardLabel">Model Input</text>
    <text x="26" y="80" class="small">safetensors</text>
    <text x="26" y="106" class="small">tokenizer</text>
    <text x="26" y="132" class="mono">qcache</text>
  </g>

  <g transform="translate(972 168)">
    <rect class="card" width="238" height="160" rx="28" fill="url(#green)"/>
    <text x="26" y="44" class="cardLabel">Runtime Output</text>
    <text x="26" y="80" class="small">chat</text>
    <text x="26" y="106" class="small">rollout</text>
    <text x="26" y="132" class="small">local serving</text>
  </g>

  <path class="flow" d="M308 248 C344 248 354 248 390 248"/>
  <path class="flow" d="M890 248 C926 248 936 248 972 248"/>

  <g transform="translate(70 428)">
    <rect class="panel" width="238" height="126" rx="26" stroke="rgba(147,197,253,.38)"/>
    <text x="24" y="40" class="cardLabel">Correctness</text>
    <text x="24" y="75" class="small">CPU FP32</text>
    <text x="24" y="100" class="small">logits diff</text>
  </g>

  <g transform="translate(344 428)">
    <rect class="panel" width="238" height="126" rx="26" stroke="rgba(34,211,238,.44)"/>
    <text x="24" y="40" class="cardLabel">Kernels</text>
    <text x="24" y="75" class="small">cuda-oxide</text>
    <text x="24" y="100" class="small">Q4/Q8 GEMV</text>
  </g>

  <g transform="translate(618 428)">
    <rect class="panel" width="238" height="126" rx="26" stroke="rgba(253,230,138,.44)"/>
    <text x="24" y="40" class="cardLabel">Sparse Models</text>
    <text x="24" y="75" class="small">router</text>
    <text x="24" y="100" class="small">top-k experts</text>
  </g>

  <g transform="translate(892 428)">
    <rect class="panel" width="318" height="126" rx="26" stroke="rgba(134,239,172,.44)"/>
    <text x="24" y="40" class="cardLabel">Edge + Hardware</text>
    <text x="24" y="75" class="small">KV pages · adapters · trajectories</text>
    <text x="24" y="100" class="small">GPU · NPU · RISC-V</text>
  </g>

  <path class="softFlow dash" d="M642 376 C642 404 738 398 738 428"/>
  <path class="softFlow dash" d="M536 376 C536 404 463 398 463 428"/>
  <path class="softFlow dash" d="M466 376 C402 405 246 390 190 428"/>
  <path class="softFlow dash" d="M812 376 C872 406 1000 394 1050 428"/>

  <g transform="translate(130 612)">
    <rect width="1020" height="58" rx="29" fill="rgba(15,23,42,.72)" stroke="rgba(255,255,255,.16)"/>
    <text x="36" y="36" class="small">Core idea: explicit runtime state + native kernels + hardware-aware policy for modern LLM systems</text>
  </g>
</svg>
