<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">Ferrule current architecture</title>
  <desc id="desc">Ferrule architecture showing CLI and runtime orchestration, DeepSeek V4 model semantics, semantic safetensors source binding, generic CUDA source operators, and the path toward parity and 20 token per second decode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#10172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#86efac"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { fill: #f8fafc; font: 800 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.03em; }
      .subtitle { fill: #cbd5e1; font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #f8fafc; font: 800 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #cbd5e1; font: 500 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #94a3b8; font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #e2e8f0; font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .card { fill: #111827; stroke: #334155; stroke-width: 1.2; filter: url(#shadow); }
      .card2 { fill: #0f172a; stroke: #334155; stroke-width: 1.2; filter: url(#shadow); }
      .soft { fill: #0b1220; stroke: #263244; stroke-width: 1; }
      .pillText { fill: #0b1020; font: 800 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .03em; }
      .arrow { stroke: #93c5fd; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrowGreen { stroke: #86efac; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .arrowDim { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="920" rx="28"/>
  <circle cx="1040" cy="80" r="220" fill="#2563eb" opacity="0.10"/>
  <circle cx="220" cy="830" r="260" fill="#f97316" opacity="0.09"/>
  <circle cx="680" cy="520" r="300" fill="#7c3aed" opacity="0.08"/>

  <text x="54" y="62" class="title">Ferrule Architecture — Real DSV4 CUDA Chat Milestone</text>
  <text x="56" y="94" class="subtitle">Rust-native inference with model-family semantics, source-preserving tensors, MoE residency, and cuda-oxide operators.</text>

  <rect x="56" y="120" width="176" height="32" rx="16" fill="url(#green)"/>
  <text x="77" y="141" class="pillText">REAL DSV4 CHAT</text>
  <rect x="248" y="120" width="198" height="32" rx="16" fill="url(#blue)"/>
  <text x="270" y="141" class="pillText">FULL 43-LAYER CUDA</text>
  <rect x="462" y="120" width="186" height="32" rx="16" fill="url(#orange)"/>
  <text x="484" y="141" class="pillText">PARITY NEXT</text>
  <rect x="664" y="120" width="236" height="32" rx="16" fill="url(#violet)"/>
  <text x="686" y="141" class="pillText">20 TOK/S DECODE TARGET</text>

  <!-- Top runtime lane -->
  <rect class="card" x="52" y="190" width="250" height="122" rx="20"/>
  <text x="78" y="224" class="label">1. User surfaces</text>
  <text x="78" y="252" class="small">readline chat · CLI · server</text>
  <text x="78" y="276" class="small">bench · probes · parity JSON</text>
  <text x="78" y="298" class="mono">just dsv4-chat tokens=128</text>

  <rect class="card" x="356" y="190" width="250" height="122" rx="20"/>
  <text x="382" y="224" class="label">2. Runtime control</text>
  <text x="382" y="252" class="small">tokenizer · templates · stops</text>
  <text x="382" y="276" class="small">session position · stats</text>
  <text x="382" y="298" class="small">greedy top-k fast path</text>

  <rect class="card" x="660" y="190" width="250" height="122" rx="20"/>
  <text x="686" y="224" class="label">3. Model boundary</text>
  <text x="686" y="252" class="small">DSV4 semantics stay here</text>
  <text x="686" y="276" class="small">no mock · no hybrid · no</text>
  <text x="686" y="298" class="small">DeepSeek-only CUDA kernels</text>

  <rect class="card" x="964" y="190" width="250" height="122" rx="20"/>
  <text x="990" y="224" class="label">4. Output</text>
  <text x="990" y="252" class="small">stream tokens to chat</text>
  <text x="990" y="276" class="small">report prefill/decode stats</text>
  <text x="990" y="298" class="small">next: parity + throughput</text>

  <path class="arrow" d="M302 251 C324 251 334 251 356 251"/>
  <path class="arrow" d="M606 251 C628 251 638 251 660 251"/>
  <path class="arrow" d="M910 251 C932 251 942 251 964 251"/>

  <!-- Source binding lane -->
  <rect class="card2" x="52" y="370" width="250" height="164" rx="20"/>
  <text x="78" y="404" class="label">Local source artifacts</text>
  <text x="78" y="434" class="small">DeepSeek-V4-Flash-DSpark</text>
  <text x="78" y="458" class="small">48 HF safetensors shards</text>
  <text x="78" y="482" class="small">tokenizer.json + config.json</text>
  <text x="78" y="506" class="small">official encoding/inference files</text>

  <rect class="card2" x="356" y="370" width="250" height="164" rx="20"/>
  <text x="382" y="404" class="label">Semantic source binding</text>
  <text x="382" y="434" class="small">bounded reads by role</text>
  <text x="382" y="458" class="small">attention · HC · router</text>
  <text x="382" y="482" class="small">shared/routed experts</text>
  <text x="382" y="506" class="small">embedding · output head</text>

  <rect class="card2" x="660" y="370" width="554" height="244" rx="24"/>
  <text x="690" y="404" class="label">DeepSeek V4 layer semantics</text>
  <text x="690" y="432" class="small">The model-specific forward path is explicit and inspectable.</text>

  <rect class="soft" x="690" y="458" width="226" height="62" rx="14"/>
  <text x="710" y="483" class="small">Hyper-Connections</text>
  <text x="710" y="505" class="tiny">hc_pre · hc_post · hc_head</text>

  <rect class="soft" x="948" y="458" width="226" height="62" rx="14"/>
  <text x="968" y="483" class="small">MLA sparse attention</text>
  <text x="968" y="505" class="tiny">window KV · compressed KV</text>

  <rect class="soft" x="690" y="538" width="226" height="62" rx="14"/>
  <text x="710" y="563" class="small">MoE routing</text>
  <text x="710" y="585" class="tiny">hash/top-k · FP4 experts</text>

  <rect class="soft" x="948" y="538" width="226" height="62" rx="14"/>
  <text x="968" y="563" class="small">Output head</text>
  <text x="968" y="585" class="tiny">norm · lm_head · top-k</text>

  <path class="arrowGreen" d="M302 452 C324 452 334 452 356 452"/>
  <path class="arrowGreen" d="M606 452 C628 452 638 452 660 452"/>
  <path class="arrowDim" d="M785 312 C785 332 785 348 785 370"/>

  <!-- Operators and hardware lane -->
  <rect class="card" x="52" y="672" width="360" height="148" rx="22"/>
  <text x="82" y="708" class="label">Generic CUDA source operators</text>
  <text x="82" y="738" class="small">F32 / BF16 / FP8 / FP4 source linears</text>
  <text x="82" y="762" class="small">sparse attention sink · grouped wo_a</text>
  <text x="82" y="786" class="small">HC kernels · SwiGLU · routed FP4 experts</text>

  <rect class="card" x="462" y="672" width="304" height="148" rx="22"/>
  <text x="492" y="708" class="label">cuda-oxide backend</text>
  <text x="492" y="738" class="small">Rust kernels compiled to CUDA</text>
  <text x="492" y="762" class="small">cargo oxide build/test wrappers</text>
  <text x="492" y="786" class="small">current target: sm_121</text>

  <rect class="card" x="816" y="672" width="398" height="148" rx="22"/>
  <text x="846" y="708" class="label">Next performance architecture</text>
  <text x="846" y="738" class="small">device-resident tensors, KV, experts</text>
  <text x="846" y="762" class="small">batched selected-expert kernels</text>
  <text x="846" y="786" class="small">GPU top-k sampler · CUDA graph replay</text>

  <path class="arrow" d="M803 614 C720 640 570 648 412 724"/>
  <path class="arrow" d="M412 746 C432 746 442 746 462 746"/>
  <path class="arrow" d="M766 746 C786 746 796 746 816 746"/>

  <!-- Footer callouts -->
  <rect x="52" y="854" width="558" height="38" rx="19" fill="#052e16" stroke="#22c55e" stroke-opacity="0.45"/>
  <text x="76" y="879" class="small">Milestone now: real DSV4 CUDA chat over local safetensors.</text>

  <rect x="660" y="854" width="554" height="38" rx="19" fill="#431407" stroke="#fb923c" stroke-opacity="0.45"/>
  <text x="684" y="879" class="small">Next gates: official numeric parity, then 20 tok/s load-excluded decode.</text>
</svg>
