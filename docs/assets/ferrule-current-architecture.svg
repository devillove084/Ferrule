<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">Ferrule Architecture</title>
  <desc id="desc">Ferrule architecture: 10 crates in four layers — CLI, execution + backends, vocabulary + IR + model policies, foundation. Shows storage/residency vocabulary, expert streaming, graph runtime, and DSV4 execution path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#10172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L9,5 L2,8 Z" fill="#93c5fd"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L9,5 L2,8 Z" fill="#86efac"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L9,5 L2,8 Z" fill="#67e8f9"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { fill: #f8fafc; font: 800 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.03em; }
      .subtitle { fill: #94a3b8; font: 500 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #f8fafc; font: 700 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .crateName { fill: #e2e8f0; font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .small { fill: #94a3b8; font: 500 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 500 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #cbd5e1; font: 500 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .pillText { fill: #0b1020; font: 800 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .03em; }
      .card { fill: #111827; stroke: #334155; stroke-width: 1.2; filter: url(#shadow); }
      .cardStorage { fill: #0c1a26; stroke: #0891b2; stroke-width: 1.5; filter: url(#shadow); }
      .cardGraph { fill: #0f1326; stroke: #7c3aed; stroke-width: 1.5; filter: url(#shadow); }
      .cardModel { fill: #0d1a14; stroke: #22c55e; stroke-width: 1.5; filter: url(#shadow); }
      .cardCuda { fill: #1a1208; stroke: #f97316; stroke-width: 1.5; filter: url(#shadow); }
      .soft { fill: #0b1220; stroke: #263244; stroke-width: 1; }
      .softStorage { fill: #061a24; stroke: #155e75; stroke-width: 1; }
      .softGraph { fill: #0d1124; stroke: #5b21b6; stroke-width: 1; }
      .arrow { stroke: #93c5fd; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrowGreen { stroke: #86efac; stroke-width: 2; fill: none; marker-end: url(#arrowGreen); }
      .arrowCyan { stroke: #67e8f9; stroke-width: 2; fill: none; marker-end: url(#arrowCyan); }
      .arrowDim { stroke: #475569; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
      .layerLabel { fill: #475569; font: 700 10px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .08em; text-transform: uppercase; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="980" rx="28"/>
  <circle cx="1050" cy="70" r="200" fill="#7c3aed" opacity="0.07"/>
  <circle cx="180" cy="900" r="240" fill="#f97316" opacity="0.06"/>
  <circle cx="640" cy="500" r="280" fill="#0891b2" opacity="0.05"/>

  <text x="52" y="50" class="title">Ferrule Architecture</text>
  <text x="54" y="72" class="subtitle">Rust-native LLM runtime — sparse MoE, expert streaming, storage residency vocabulary, cuda-oxide operators</text>

  <!-- Status pills -->
  <rect x="52" y="90" width="150" height="24" rx="12" fill="url(#green)"/>
  <text x="65" y="106" class="pillText">DSV4 CUDA CHAT</text>
  <rect x="216" y="90" width="130" height="24" rx="12" fill="url(#blue)"/>
  <text x="229" y="106" class="pillText">GRAPH BRIDGE</text>
  <rect x="360" y="90" width="140" height="24" rx="12" fill="url(#cyan)"/>
  <text x="373" y="106" class="pillText">STORAGE VOCAB</text>
  <rect x="514" y="90" width="140" height="24" rx="12" fill="url(#violet)"/>
  <text x="527" y="106" class="pillText">RESIDENCY TRAIT</text>
  <rect x="668" y="90" width="120" height="24" rx="12" fill="url(#orange)"/>
  <text x="681" y="106" class="pillText">PARITY NEXT</text>

  <!-- ════════ LAYER 1 — CLI ════════ -->
  <text x="54" y="140" class="layerLabel">LAYER 1 — CLI</text>

  <rect class="card" x="52" y="148" width="1176" height="52" rx="14"/>
  <text x="72" y="170" class="crateName">ferrule-cli</text>
  <text x="72" y="190" class="small">chat · run · gpu-run · info · bench-infer · compare-logits · server · deepseek-v4-probe · deepseek-v4-generate · perplexity</text>

  <path class="arrow" d="M360 200 L360 224"/>
  <path class="arrow" d="M920 200 L920 224"/>

  <!-- ════════ LAYER 2 — EXECUTION ════════ -->
  <text x="54" y="216" class="layerLabel">LAYER 2 — EXECUTION &amp; BACKENDS</text>

  <!-- ferrule-runtime (big card) -->
  <rect class="card" x="52" y="224" width="600" height="310" rx="18"/>
  <text x="72" y="250" class="crateName">ferrule-runtime</text>

  <!-- Row 1: three modules -->
  <rect class="soft" x="68" y="264" width="178" height="54" rx="10"/>
  <text x="80" y="282" class="small">Graph runtime</text>
  <text x="80" y="298" class="tiny">GraphProgram</text>
  <text x="80" y="310" class="tiny">BackendObjectStore · RefBackend</text>

  <rect class="soft" x="256" y="264" width="178" height="54" rx="10"/>
  <text x="268" y="282" class="small">Expert streaming</text>
  <text x="268" y="298" class="tiny">ExpertStreamingPlanner</text>
  <text x="268" y="310" class="tiny">ExpertStreamingReader</text>

  <rect class="soft" x="444" y="264" width="192" height="54" rx="10"/>
  <text x="456" y="282" class="small">Expert residency</text>
  <text x="456" y="298" class="tiny">ExpertResidencyBackend trait</text>
  <text x="456" y="310" class="tiny">apply_streaming_step()</text>

  <!-- Row 2: three modules -->
  <rect class="soft" x="68" y="328" width="178" height="54" rx="10"/>
  <text x="80" y="346" class="small">Runner &amp; session</text>
  <text x="80" y="362" class="tiny">ModelRunner trait</text>
  <text x="80" y="374" class="tiny">GpuOlmoeRunner · DSV4Runner</text>

  <rect class="soft" x="256" y="328" width="178" height="54" rx="10"/>
  <text x="268" y="346" class="small">KV cache</text>
  <text x="268" y="362" class="tiny">KvCache trait · contiguous</text>
  <text x="268" y="374" class="tiny">radix prefix cache</text>

  <rect class="soft" x="444" y="328" width="192" height="54" rx="10"/>
  <text x="456" y="346" class="small">Sampler &amp; scheduler</text>
  <text x="456" y="362" class="tiny">top-k · top-p · min-p · repeat</text>
  <text x="456" y="374" class="tiny">batching · preempt</text>

  <!-- DSV4 model semantics block -->
  <rect class="soft" x="68" y="394" width="568" height="126" rx="10"/>
  <text x="80" y="414" class="small">DeepSeek V4 model semantics (models/deepseek_v4.rs)</text>
  <text x="80" y="434" class="mono">hc_pre → attn_norm → attention → hc_post</text>
  <text x="80" y="450" class="mono">→ hc_pre → ffn_norm → MoE → hc_post</text>
  <text x="80" y="468" class="tiny">DeepSeekV4CudaOperatorCache</text>
  <text x="80" y="482" class="tiny">experts: HashMap&lt;ExpertId, CudaFp4ExpertHandles&gt;</text>
  <text x="80" y="496" class="tiny">planner · reader · counters</text>
  <text x="80" y="512" class="tiny">hash/score routing · FP4 experts · MLA sparse attn</text>

  <!-- ferrule-cuda -->
  <rect class="cardCuda" x="672" y="224" width="280" height="150" rx="18"/>
  <text x="692" y="250" class="crateName">ferrule-cuda</text>
  <text x="692" y="270" class="small">cuda-oxide kernels · GPU forward</text>
  <text x="692" y="288" class="small">WeightPack reader · artifact ops</text>
  <text x="692" y="306" class="small">GEMV Q4/Q8 · FP4 SwiGLU expert</text>
  <text x="692" y="324" class="small">sparse attention · HC kernels</text>
  <text x="692" y="342" class="small">RoPE · RMSNorm · router topk</text>
  <text x="692" y="360" class="small">embedding · lm_head · saxpy</text>

  <!-- ferrule-bench -->
  <rect class="card" x="672" y="390" width="280" height="88" rx="18"/>
  <text x="692" y="414" class="crateName">ferrule-bench</text>
  <text x="692" y="434" class="small">benchmarks · PK harness</text>
  <text x="692" y="452" class="small">reference smokes · perplexity</text>
  <text x="692" y="470" class="small">JSON reports · TransferCounters</text>

  <!-- arrow runtime → cuda -->
  <path class="arrow" d="M652 300 L672 300"/>

  <!-- ════════ LAYER 3 — VOCABULARY ════════ -->
  <text x="54" y="552" class="layerLabel">LAYER 3 — VOCABULARY · IR · MODEL POLICIES</text>

  <!-- ferrule-storage -->
  <rect class="cardStorage" x="52" y="560" width="300" height="190" rx="18"/>
  <text x="72" y="584" class="crateName">ferrule-storage</text>
  <rect x="180" y="572" width="56" height="18" rx="9" fill="url(#cyan)"/>
  <text x="190" y="585" class="pillText">NEW</text>

  <rect class="softStorage" x="68" y="600" width="134" height="64" rx="10"/>
  <text x="78" y="618" class="small">Object identity</text>
  <text x="78" y="634" class="tiny">StorageObjectId (enum)</text>
  <text x="78" y="648" class="tiny">ModelRevision</text>
  <text x="78" y="660" class="tiny">WeightPackId · Display</text>

  <rect class="softStorage" x="210" y="600" width="126" height="64" rx="10"/>
  <text x="220" y="618" class="small">Locators</text>
  <text x="220" y="634" class="tiny">ObjectLocator</text>
  <text x="220" y="648" class="tiny">LocalFile · LocalMmap</text>
  <text x="220" y="660" class="tiny">WeightPack · Remote</text>

  <rect class="softStorage" x="68" y="672" width="134" height="64" rx="10"/>
  <text x="78" y="690" class="small">Placement</text>
  <text x="78" y="706" class="tiny">Device · Host · Disk</text>
  <text x="78" y="720" class="tiny">Remote · RemoteEndpoint</text>
  <text x="78" y="732" class="tiny">tier_rank()</text>

  <rect class="softStorage" x="210" y="672" width="126" height="64" rx="10"/>
  <text x="220" y="690" class="small">Replica &amp; transfer</text>
  <text x="220" y="706" class="tiny">ObjectReplica</text>
  <text x="220" y="720" class="tiny">ReplicaHandleId</text>
  <text x="220" y="732" class="tiny">TransferEngine trait</text>

  <!-- ferrule-graph -->
  <rect class="cardGraph" x="372" y="560" width="260" height="190" rx="18"/>
  <text x="392" y="584" class="crateName">ferrule-graph</text>

  <rect class="softGraph" x="388" y="600" width="228" height="44" rx="10"/>
  <text x="400" y="618" class="small">Opaque graph IR</text>
  <text x="400" y="636" class="tiny">ComputeGraph · OpKey · ExternalKey</text>

  <rect class="softGraph" x="388" y="654" width="228" height="44" rx="10"/>
  <text x="400" y="672" class="small">Graph program</text>
  <text x="400" y="690" class="tiny">GraphProgram · ExecutionBatch</text>

  <rect class="softGraph" x="388" y="708" width="228" height="30" rx="10"/>
  <text x="400" y="727" class="tiny">shape registry · validation</text>

  <!-- ferrule-model -->
  <rect class="cardModel" x="652" y="560" width="300" height="190" rx="18"/>
  <text x="672" y="584" class="crateName">ferrule-model</text>

  <rect class="soft" x="668" y="600" width="134" height="64" rx="10"/>
  <text x="678" y="618" class="small">OLMoE loader</text>
  <text x="678" y="634" class="tiny">safetensors → FP32</text>
  <text x="678" y="648" class="tiny">Q4/Q8 quantization</text>
  <text x="678" y="660" class="tiny">WeightPack cache</text>

  <rect class="soft" x="810" y="600" width="126" height="64" rx="10"/>
  <text x="820" y="618" class="small">DSV4 descriptor</text>
  <text x="820" y="634" class="tiny">72K tensors</text>
  <text x="820" y="648" class="tiny">48 shards · 167 GB</text>
  <text x="820" y="660" class="tiny">all classified</text>

  <rect class="soft" x="668" y="672" width="268" height="30" rx="10"/>
  <text x="678" y="691" class="small">families/ · common.rs · deepseek_v4.rs</text>

  <rect class="soft" x="668" y="710" width="268" height="30" rx="10"/>
  <text x="678" y="729" class="small">TokenizerHandle · EnginePlan · policies</text>

  <!-- arrows: layer 3 → layer 2 -->
  <path class="arrowCyan" d="M202 560 L202 534 L380 534 L380 514"/>
  <path class="arrow" d="M502 560 L502 534 L440 534 L440 514"/>
  <path class="arrowGreen" d="M802 560 L802 534 L520 534 L520 514"/>

  <!-- ════════ LAYER 4 — FOUNDATION ════════ -->
  <text x="54" y="772" class="layerLabel">LAYER 4 — FOUNDATION</text>

  <rect class="card" x="52" y="780" width="200" height="50" rx="12"/>
  <text x="72" y="802" class="crateName">ferrule-core</text>
  <text x="72" y="820" class="small">Error · QuantType · observability</text>

  <rect class="card" x="272" y="780" width="200" height="50" rx="12"/>
  <text x="292" y="802" class="crateName">ferrule-quant</text>
  <text x="292" y="820" class="small">Q4_0 · Q8_0 · FP4 · FP8 · mixed</text>

  <rect class="card" x="492" y="780" width="200" height="50" rx="12"/>
  <text x="512" y="802" class="crateName">ferrule-gguf</text>
  <text x="512" y="820" class="small">safetensors reader · GGUF reader</text>

  <!-- Storage tier hierarchy -->
  <rect class="cardStorage" x="720" y="780" width="508" height="110" rx="14"/>
  <text x="740" y="804" class="label">Storage tier hierarchy</text>

  <rect x="740" y="816" width="96" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="754" y="834" class="tiny" fill="#93c5fd">Device (VRAM)</text>

  <rect x="846" y="816" width="96" height="28" rx="14" class="softStorage"/>
  <text x="860" y="834" class="tiny">Host (DRAM)</text>

  <rect x="952" y="816" width="96" height="28" rx="14" class="softStorage"/>
  <text x="966" y="834" class="tiny">Disk (NVMe)</text>

  <rect x="1058" y="816" width="96" height="28" rx="14" class="softStorage"/>
  <text x="1072" y="834" class="tiny">Remote (P5)</text>

  <path class="arrowDim" d="M836 830 L846 830"/>
  <path class="arrowDim" d="M942 830 L952 830"/>
  <path class="arrowDim" d="M1048 830 L1058 830"/>

  <text x="740" y="868" class="tiny">↑ hotter · cheaper to miss a load</text>
  <text x="740" y="882" class="tiny">↓ colder · cheaper to evict</text>

  <!-- Footer -->
  <rect x="52" y="872" width="640" height="32" rx="16" fill="#052e16" stroke="#22c55e" stroke-opacity="0.35"/>
  <text x="68" y="892" class="small">Milestone: DSV4 CUDA chat · storage vocab landed · ExpertResidencyBackend trait</text>

  <rect x="720" y="908" width="508" height="32" rx="16" fill="#1c1917" stroke="#f97316" stroke-opacity="0.30"/>
  <text x="736" y="928" class="small">Next: official parity · device-resident decode · host-staged expert cache · 20 tok/s</text>
</svg>
