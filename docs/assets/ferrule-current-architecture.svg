<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ferrule Architecture</title>
  <desc id="desc">A simplified Ferrule architecture diagram showing model assets, Rust runtime, MoE execution, edge inference, and state fabric.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#101A34"/>
      <stop offset="1" stop-color="#06221F"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D8B4FE"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#93C5FD"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#86EFAC"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #F8FAFC; letter-spacing: -0.03em; }
      .subtitle { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #CBD5E1; }
      .label { font: 760 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #F8FAFC; }
      .small { font: 560 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #E2E8F0; }
      .tiny { font: 540 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #C8D3E4; }
      .mono { font: 650 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #F1F5F9; }
      .card { filter: url(#shadow); stroke: rgba(255,255,255,.18); stroke-width: 1; }
      .panel { fill: rgba(15,23,42,.78); stroke: rgba(148,163,184,.25); stroke-width: 1; filter: url(#shadow); }
      .pill { fill: rgba(15,23,42,.56); stroke: rgba(226,232,240,.16); stroke-width: 1; }
      .flow { stroke: #93C5FD; stroke-width: 2.8; marker-end: url(#arrow); fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .softFlow { stroke: #86EFAC; stroke-width: 2.2; marker-end: url(#arrowSoft); fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: .86; }
      .dash { stroke-dasharray: 7 8; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="260" fill="#2563EB" opacity="0.10"/>
  <circle cx="210" cy="610" r="280" fill="#14B8A6" opacity="0.10"/>
  <circle cx="660" cy="350" r="340" fill="#A855F7" opacity="0.06"/>

  <text x="64" y="70" class="title">Ferrule Architecture</text>
  <text x="64" y="100" class="subtitle">Rust-native sparse MoE runtime for edge LLM systems</text>

  <g transform="translate(70 178)">
    <rect class="card" width="250" height="150" rx="28" fill="url(#purple)"/>
    <text x="28" y="44" class="label">Model Assets</text>
    <text x="28" y="78" class="small">safetensors</text>
    <text x="28" y="102" class="small">tokenizer</text>
    <text x="28" y="126" class="mono">qcache</text>
  </g>

  <g transform="translate(405 145)">
    <rect class="card" width="470" height="216" rx="32" fill="url(#orange)"/>
    <text x="32" y="48" class="label">Ferrule Runtime</text>
    <text x="32" y="78" class="small">Rust core + cuda-oxide kernels</text>

    <g transform="translate(32 108)">
      <rect class="pill" width="128" height="40" rx="14"/>
      <text x="24" y="25" class="tiny">Rust Core</text>
    </g>
    <g transform="translate(174 108)">
      <rect class="pill" width="128" height="40" rx="14"/>
      <text x="20" y="25" class="tiny">MoE Engine</text>
    </g>
    <g transform="translate(316 108)">
      <rect class="pill" width="120" height="40" rx="14"/>
      <text x="22" y="25" class="tiny">KV Cache</text>
    </g>
    <g transform="translate(32 160)">
      <rect class="pill" width="178" height="40" rx="14"/>
      <text x="22" y="25" class="tiny">Quantized GEMV</text>
    </g>
    <g transform="translate(228 160)">
      <rect class="pill" width="208" height="40" rx="14"/>
      <text x="22" y="25" class="tiny">Router + Experts</text>
    </g>
  </g>

  <g transform="translate(960 178)">
    <rect class="card" width="250" height="150" rx="28" fill="url(#green)"/>
    <text x="28" y="44" class="label">Edge Inference</text>
    <text x="28" y="78" class="small">chat</text>
    <text x="28" y="102" class="small">rollout</text>
    <text x="28" y="126" class="small">local serving</text>
  </g>

  <path class="flow" d="M320 253 C350 253 372 253 405 253"/>
  <path class="flow" d="M875 253 C910 253 928 253 960 253"/>

  <g transform="translate(100 455)">
    <rect class="panel" width="1080" height="118" rx="32"/>
    <text x="34" y="44" class="label">State Fabric</text>
    <text x="34" y="76" class="small">models · qcache · KV pages · experts · adapters · trajectories</text>

    <g transform="translate(720 34)">
      <rect class="pill" width="132" height="44" rx="16"/>
      <text x="28" y="28" class="tiny">Edge</text>
    </g>
    <g transform="translate(866 34)">
      <rect class="pill" width="132" height="44" rx="16"/>
      <text x="28" y="28" class="tiny">Cloud</text>
    </g>
  </g>

  <g transform="translate(446 608)">
    <rect width="388" height="52" rx="26" fill="rgba(6,182,212,.13)" stroke="rgba(103,232,249,.40)"/>
    <text x="34" y="33" class="small">Future hardware: GPU · NPU · RISC-V</text>
  </g>

  <path class="softFlow dash" d="M640 361 C640 392 640 420 640 455"/>
  <path class="softFlow dash" d="M1085 328 C1085 396 1010 420 990 455"/>
  <path class="softFlow dash" d="M640 573 C640 590 640 596 640 608"/>

  <g transform="translate(70 642)">
    <rect width="260" height="42" rx="21" fill="rgba(34,197,94,.13)" stroke="rgba(134,239,172,.38)"/>
    <circle cx="28" cy="21" r="6" fill="#86EFAC"/>
    <text x="48" y="26" class="tiny">OLMoE-Instruct chat works</text>
  </g>
</svg>
